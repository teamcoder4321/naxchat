version: '3.8'

services:
  mongodb:
    image: mongo:6
    container_name: nexchat-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    restart: unless-stopped
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nexchat-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend service (uncomment to run in Docker)
  # backend:
  #   build: ./backend
  #   container_name: nexchat-backend
  #   ports:
  #     - "5000:5000"
  #   environment:
  #     - MONGODB_URI=mongodb://admin:password@mongodb:27017/nexchat?authSource=admin
  #     - REDIS_HOST=redis
  #     - REDIS_PORT=6379
  #     - JWT_SECRET=your-secret-key
  #     - PORT=5000
  #     - NODE_ENV=development
  #     - FRONTEND_URL=http://localhost:3000
  #   depends_on:
  #     mongodb:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #   restart: unless-stopped

volumes:
  mongodb_data:
  redis_data:
